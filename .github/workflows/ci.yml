name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: xifty-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ github.workspace }}/XIFtyPython
    env:
      PYTHONPATH: src
    steps:
      - name: Check out binding repo
        uses: actions/checkout@v5
        with:
          path: XIFtyPython

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check out core repo
        uses: actions/checkout@v5
        with:
          repository: XIFtySense/XIFty
          path: XIFty

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read runtime version
        id: runtime_version
        run: echo "value=$(cat runtime-version.txt)" >> "$GITHUB_OUTPUT"

      - name: Build canonical runtime artifact
        working-directory: ${{ github.workspace }}/XIFty
        run: |
          mkdir -p /tmp/xifty-runtime
          python3 tools/build-runtime-artifact.py \
            --output /tmp/xifty-runtime/xifty-runtime-linux-x64-v${{ steps.runtime_version.outputs.value }}.tar.gz
          python3 tools/validate-runtime-artifact.py \
            --artifact /tmp/xifty-runtime/xifty-runtime-linux-x64-v${{ steps.runtime_version.outputs.value }}.tar.gz
          tar -xzf /tmp/xifty-runtime/xifty-runtime-linux-x64-v${{ steps.runtime_version.outputs.value }}.tar.gz -C /tmp/xifty-runtime

      - name: Stage bundled runtime
        env:
          XIFTY_RUNTIME_DIR: /tmp/xifty-runtime/xifty-runtime-linux-x64-v${{ steps.runtime_version.outputs.value }}
        run: python scripts/stage-runtime.py

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run examples
        run: |
          python examples/basic_usage.py
          python examples/gallery_ingest.py

      - name: Install build backend
        run: python -m pip install build

      - name: Build distributions
        run: python -m build
