name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: xifty-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ github.workspace }}/XIFtyPython
    env:
      PYTHONPATH: src
    steps:
      - name: Check out binding repo
        uses: actions/checkout@v5
        with:
          path: XIFtyPython

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare core
        run: bash scripts/prepare-core.sh

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            XIFtyPython/.xifty-core -> target

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run examples
        run: |
          python examples/basic_usage.py
          python examples/gallery_ingest.py

      - name: Install build backend
        run: python -m pip install build

      - name: Build distributions
        run: python -m build
